services:
  musicvault:
    build: /app/music_importer
    container_name: musicvault
    ports:
      - "8081:8080"
    volumes:
      - /app/music_importer/downloads:/app/downloads
      - /app/music_importer/data:/app/data
      - /app/music_importer/config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    command: python server.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
