services:
  musicvault:
    build: .
    container_name: musicvault
    ports:
      - "8081:8080"
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    command: python server.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
